<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Research Capture{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/pages.css">
    <link rel="stylesheet" href="/static/css/motion.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
<div class="shell" x-data="{ captureOpen: false, createOpen: false }">

    <!-- ── Left navigation ─────────────────────────────────────── -->
    <nav class="nav-left"
         x-data="{
             exposureCounts: { stale_count: 0, position_count: 0, action_count: 0, aggregate: 0 }
         }"
         x-init="
             fetch('/exposure/counts')
               .then(r => r.json())
               .then(d => { exposureCounts = d; })
               .catch(() => {})
         ">

        <div class="nav-identity">research capture</div>
        <div class="nav-divider"></div>

        <!-- Capture component (two-target) -->
        {% include "components/capture.html" %}

        <div class="nav-divider"></div>

        <!-- Exposure board -->
        <a href="/exposure" class="nav-item" style="display: block">
            Exposure board
            <span class="badge"
                  data-status="overdue"
                  x-show="exposureCounts.aggregate > 0"
                  x-text="exposureCounts.aggregate"
                  style="margin-left: var(--space-2)"></span>
        </a>
        <div style="padding: 0 var(--space-4) var(--space-2)">
            <div style="display: flex; justify-content: space-between; align-items: center;
                        padding: var(--space-1) 0;
                        font-family: var(--font-ui); font-size: var(--text-xs);
                        color: var(--color-text-tertiary)">
                <span>Staleness</span>
                <span class="badge"
                      data-status="overdue"
                      x-show="exposureCounts.stale_count > 0"
                      x-text="exposureCounts.stale_count"></span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;
                        padding: var(--space-1) 0;
                        font-family: var(--font-ui); font-size: var(--text-xs);
                        color: var(--color-text-tertiary)">
                <span>Positions</span>
                <span class="badge"
                      data-status="active"
                      x-show="exposureCounts.position_count > 0"
                      x-text="exposureCounts.position_count"></span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;
                        padding: var(--space-1) 0;
                        font-family: var(--font-ui); font-size: var(--text-xs);
                        color: var(--color-text-tertiary)">
                <span>Actions</span>
                <span class="badge"
                      data-status="overdue"
                      x-show="exposureCounts.action_count > 0"
                      x-text="exposureCounts.action_count"></span>
            </div>
        </div>

        <div class="nav-divider"></div>

        <!-- Entity section -->
        <div class="nav-section-header">Entities</div>
        <div class="nav-chips" x-data="{ filter: localStorage.getItem('rcs_entity_filter') ? JSON.parse(localStorage.getItem('rcs_entity_filter')).type : null }">
            <a href="/"
               class="nav-chip"
               :class="{ 'active': filter === null }"
               @click="filter = null; localStorage.setItem('rcs_entity_filter', JSON.stringify({type: null, sort: 'recency'})); htmx.ajax('GET', '/api/entities', '#entity-list')">
                all
            </a>
            <a href="/?type=canvas"
               class="nav-chip"
               :class="{ 'active': filter === 'canvas' }"
               @click="filter = 'canvas'; localStorage.setItem('rcs_entity_filter', JSON.stringify({type: 'canvas', sort: 'recency'})); htmx.ajax('GET', '/api/entities?type=canvas', '#entity-list')">
                canvas
            </a>
            <a href="/?type=thesis"
               class="nav-chip"
               :class="{ 'active': filter === 'thesis' }"
               @click="filter = 'thesis'; localStorage.setItem('rcs_entity_filter', JSON.stringify({type: 'thesis', sort: 'recency'})); htmx.ajax('GET', '/api/entities?type=thesis', '#entity-list')">
                thesis
            </a>
            <a href="/?type=observation"
               class="nav-chip"
               :class="{ 'active': filter === 'observation' }"
               @click="filter = 'observation'; localStorage.setItem('rcs_entity_filter', JSON.stringify({type: 'observation', sort: 'recency'})); htmx.ajax('GET', '/api/entities?type=observation', '#entity-list')">
                observation
            </a>
            <a href="/?type=setup"
               class="nav-chip"
               :class="{ 'active': filter === 'setup' }"
               @click="filter = 'setup'; localStorage.setItem('rcs_entity_filter', JSON.stringify({type: 'setup', sort: 'recency'})); htmx.ajax('GET', '/api/entities?type=setup', '#entity-list')">
                setup
            </a>
            <a href="/?type=trade"
               class="nav-chip"
               :class="{ 'active': filter === 'trade' }"
               @click="filter = 'trade'; localStorage.setItem('rcs_entity_filter', JSON.stringify({type: 'trade', sort: 'recency'})); htmx.ajax('GET', '/api/entities?type=trade', '#entity-list')">
                trade
            </a>
            <a href="/?type=review"
               class="nav-chip"
               :class="{ 'active': filter === 'review' }"
               @click="filter = 'review'; localStorage.setItem('rcs_entity_filter', JSON.stringify({type: 'review', sort: 'recency'})); htmx.ajax('GET', '/api/entities?type=review', '#entity-list')">
                review
            </a>
        </div>

        <div class="nav-spacer"></div>

        <div class="nav-status">
            <span id="nav-active-count">0</span> active theses &middot;
            <span id="nav-open-actions">0</span> open actions
        </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────── -->
    <main class="main-content" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- ── Right context panel (hidden by default) ──────────────── -->
    {% block panel %}{% endblock %}

</div>
</body>
</html>
