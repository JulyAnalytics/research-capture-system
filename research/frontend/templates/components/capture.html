{# capture.html — Two-target capture component (change spec Change 1).
   Quick-capture textarea + entity creation dropdown.
   Included inside base.html nav.
   Alpine state from parent: captureOpen, createOpen. #}

<div class="capture-component" x-data="{ captureText: '' }">

    <!-- Row: input area + plus button -->
    <div class="capture-row">
        <div class="capture-input-area"
             @click.capture="createOpen = false; captureOpen = true"
             @focusin="createOpen = false; captureOpen = true">
            <input type="text"
                   class="capture-text-input"
                   placeholder="Capture..."
                   x-model="captureText"
                   @keydown.enter.prevent="if (captureText.trim()) { window.location.href = '/observation/new?title=' + encodeURIComponent(captureText.trim()); }"
                   @keydown.escape="captureOpen = false; captureText = ''"
                   @blur="if (!captureText.trim()) captureOpen = false">
        </div>
        <div class="capture-divider"></div>
        <button class="capture-plus-btn"
                @click="captureOpen = false; createOpen = !createOpen"
                @click.away="createOpen = false"
                @keydown.window.escape="createOpen = false"
                aria-label="Create new entity">+</button>
    </div>

    <!-- Entity creation dropdown -->
    <div class="capture-dropdown" x-show="createOpen"
         x-transition
         @click.away="createOpen = false"
         @keydown.window.escape="createOpen = false">
        <a href="/canvas/new" class="capture-dropdown-item">Canvas</a>
        <a href="/thesis/new" class="capture-dropdown-item">Thesis</a>
        <a href="/observation/new" class="capture-dropdown-item">Observation</a>
        <a href="/setup/new" class="capture-dropdown-item">Setup</a>
        <a href="/trade/new" class="capture-dropdown-item">Trade</a>
        <a href="/action/new" class="capture-dropdown-item">Action</a>
    </div>

</div>
