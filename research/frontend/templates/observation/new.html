{% extends "base.html" %}
{% from "components/badge.html" import badge %}

{% block title %}File observation{% endblock %}

{% block content %}
<div x-data="{
    selectedThesisId: '',
    selectedThesisLabel: ''
}">

    <button onclick="history.back()" class="btn-ghost btn-compact" style="margin-bottom: var(--space-2); color: var(--color-text-secondary)">← Back</button>

    <div style="margin-bottom: var(--space-6)">
        <h1 style="font-family: var(--font-ui); font-size: var(--text-xl); font-weight: 500; margin: 0">File observation</h1>
    </div>

    <!-- Pre-file notice -->
    <div style="font-family: var(--font-ui); font-size: 12px; color: var(--color-text-tertiary); font-style: italic; margin-bottom: var(--space-5)">
        Observation status starts as watching. Link a thesis before taking.
    </div>

    <!-- Name -->
    <div style="margin-bottom: var(--space-4)">
        <label style="font-family: var(--font-ui); font-size: var(--text-sm); color: var(--color-text-secondary); display: block; margin-bottom: var(--space-1)">Name</label>
        <input type="text" class="form-input" id="obs-name" value="{{ prefill_name }}" placeholder="e.g. AAPL holding above 200dma" required>
    </div>

    <!-- Instrument + Date row -->
    <div style="display: flex; gap: var(--space-4); margin-bottom: var(--space-4); flex-wrap: wrap">
        <div style="flex: 1; min-width: 160px">
            <label style="font-family: var(--font-ui); font-size: var(--text-sm); color: var(--color-text-secondary); display: block; margin-bottom: var(--space-1)">Instrument</label>
            <input type="text" class="form-input" id="obs-instrument" placeholder="e.g. AAPL" required>
        </div>
        <div style="flex: 1; min-width: 140px">
            <label style="font-family: var(--font-ui); font-size: var(--text-sm); color: var(--color-text-secondary); display: block; margin-bottom: var(--space-1)">Date</label>
            <input type="text" class="form-input" id="obs-date" value="{{ now_date }}">
        </div>
    </div>

    <!-- Note -->
    <div style="margin-bottom: var(--space-4)">
        <label style="font-family: var(--font-ui); font-size: var(--text-sm); color: var(--color-text-secondary); display: block; margin-bottom: var(--space-1)">Note</label>
        <textarea class="form-textarea" id="obs-note" rows="5"
                  placeholder="What are you seeing?"
                  style="font-family: var(--font-prose); font-size: var(--text-prose); line-height: var(--text-prose-lh); min-height: 100px"></textarea>
    </div>

    <!-- Linked thesis (optional) -->
    <div style="margin-bottom: var(--space-5)">
        <label style="font-family: var(--font-ui); font-size: var(--text-sm); color: var(--color-text-secondary); display: block; margin-bottom: var(--space-1)">Linked thesis (optional)</label>
        <input type="text" class="form-input" id="obs-thesis-typeahead" placeholder="Search theses..."
               hx-get="/thesis/search" hx-trigger="input changed delay:300ms" hx-target="#obs-thesis-results" hx-vals='js:{q: this.value}'>
        <div id="obs-thesis-results" style="margin-top: 4px"></div>
        <div x-show="selectedThesisLabel" style="margin-top: var(--space-2); font-family: var(--font-ui); font-size: var(--text-sm); color: var(--color-analytical)">
            Selected: <span x-text="selectedThesisLabel"></span>
        </div>
    </div>

    <!-- Submit -->
    <div style="display: flex; gap: var(--space-2)">
        <button class="btn btn-primary" @click="
            const name = document.getElementById('obs-name').value.trim();
            const instrument = document.getElementById('obs-instrument').value.trim();
            const date = document.getElementById('obs-date').value.trim();
            const note = document.getElementById('obs-note').value.trim();
            const thesisInput = document.getElementById('obs-thesis-typeahead');
            const thesisId = thesisInput.dataset.selectedId || selectedThesisId || null;
            if (!name || !instrument || !date || !note) return;

            fetch('/observation', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, instrument, note, date})
            }).then(r => r.json()).then(data => {
                if (!data.id) return;
                const linkPromise = thesisId
                    ? fetch('/observation/' + data.id + '/link-thesis/' + thesisId, {method: 'POST'})
                    : Promise.resolve();
                linkPromise.then(() => { window.location.href = '/observation/' + data.id; });
            });
        ">File observation</button>
        <button class="btn-ghost btn-compact" onclick="history.back()">Cancel</button>
    </div>

</div>
{% endblock %}
